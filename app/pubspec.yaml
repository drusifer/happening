name: happening
description: Always-on-top calendar timeline strip for ADHD-friendly time awareness.
version: 0.4.0
publish_to: none

environment:
  sdk: ">=3.5.0"

dependencies:
  flutter:
    sdk: flutter

  window_manager: any
  screen_retriever: any
  googleapis: any
  googleapis_auth: any
  url_launcher: any
  http: any
  crypto: any
  flutter_secure_storage: any
  win32: any
  ffi: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: any
  mockito: any
  build_runner: any
  dart_code_linter: any
  msix: ^3.16.13
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  image_path: "assets/images/store_logo.png"
  web:
    generate: true
    image_path: "assets/images/store_logo.png"
    background_color: "#00000000"
    theme_color: "#00000000"
  windows:
    generate: true
    image_path: "assets/images/store_logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/store_logo.png"

msix_config:
    display_name: What's Happening?
    publisher_display_name: Gutstein Security Works, LLC
    identity_name: GutsteinSecurityWorksLLC.WhatsHappening # From Product Identity
    publisher: CN=1BCC9C93-9384-4EDD-BC44-CAC345171F9F     # From Product Identity
    msix_version: 1.0.4.0                        # Four-part Store version; keep in sync with version above
    logo_path: assets/images/store_logo.png      # High-res square icon
    store: true                                  # Crucial: Tells the tool this is for the Store
    capabilities: "internetClient"

flutter:
  uses-material-design: true
