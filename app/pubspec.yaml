name: happening
description: Always-on-top calendar timeline strip for ADHD-friendly time awareness.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  window_manager: ^0.3.8
  screen_retriever: ^0.1.9
  googleapis: ^13.2.0
  googleapis_auth: ^2.0.0
  url_launcher: ^6.2.0
  http: ^1.0.0
  win32: ^5.15.0
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.6.3
  build_runner: ^2.11.1
  dart_code_linter: ^3.2.1

flutter:
  uses-material-design: true
  assets:
    - assets/client_secret.json
