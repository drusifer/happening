name: happening
description: Always-on-top calendar timeline strip for ADHD-friendly time awareness.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Window management
  window_manager: ^0.3.8
  screen_retriever: ^0.1.9

  # Google auth + calendar
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  googleapis: ^13.2.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  url_launcher: ^6.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
