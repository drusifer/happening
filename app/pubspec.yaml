name: happening
description: Always-on-top calendar timeline strip for ADHD-friendly time awareness.
version: 0.2.0
publish_to: none

environment:
  sdk: ">=3.5.0"

dependencies:
  flutter:
    sdk: flutter

  window_manager: any
  screen_retriever: any
  googleapis: any
  googleapis_auth: any
  url_launcher: any
  http: any
  crypto: any
  win32: any
  ffi: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: any
  mockito: any
  build_runner: any
  dart_code_linter: any

flutter:
  uses-material-design: true
